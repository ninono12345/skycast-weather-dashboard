<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCast - Weather & Air Quality Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="bg-animation" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<main class="main-container">
  <header class="header glass-card">
    <div class="logo-section">
      <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32" aria-hidden="true">
        <defs>
          <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0284C7"/>
            <stop offset="100%" stop-color="#0EA5E9"/>
          </linearGradient>
        </defs>
        <circle cx="16" cy="14" r="8" fill="url(#logo-grad)" opacity="0.9"/>
        <path d="M8 24 Q16 16 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="16" cy="14" r="4" fill="#F59E0B" opacity="0.8"/>
      </svg>
      <div>
        <h1 class="app-title">SkyCast</h1>
        <p class="app-subtitle">Weather &amp; Air Quality Dashboard</p>
      </div>
    </div>
  </header>

  <section class="search-section glass-card" role="search">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="city-input"
        class="search-input"
        placeholder="Enter city name (e.g. Vilnius, London, Tokyo)..."
        autocomplete="off"
        aria-label="City search"
      >
      <button id="search-btn" class="btn btn-primary" aria-label="Search weather">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <span>Search</span>
      </button>
      <button id="locate-btn" class="btn btn-secondary" aria-label="Use my location" title="Use my location">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
        </svg>
      </button>
    </div>
    <p id="search-error" class="error-message" role="alert" hidden></p>
  </section>

  <div id="loading-state" class="loading-section" hidden>
    <div class="loading-grid">
      <div class="glass-card skeleton-card"><div class="skeleton-line w-60 skeleton-pulse"></div><div class="skeleton-line w-40 skeleton-pulse"></div><div class="skeleton-circle skeleton-pulse"></div></div>
      <div class="glass-card skeleton-card"><div class="skeleton-line w-50 skeleton-pulse"></div><div class="skeleton-line w-70 skeleton-pulse"></div><div class="skeleton-line w-30 skeleton-pulse"></div></div>
      <div class="glass-card skeleton-card"><div class="skeleton-line w-60 skeleton-pulse"></div><div class="skeleton-line w-40 skeleton-pulse"></div></div>
    </div>
  </div>

  <div id="weather-content" hidden>
    <section id="current-weather" class="current-section glass-card"></section>
    <section id="air-quality" class="aq-section glass-card"></section>
    <section id="details" class="details-grid"></section>
    <section id="forecast" class="forecast-section glass-card"></section>
  </div>

  <div id="welcome-state" class="welcome-section glass-card">
    <svg viewBox="0 0 80 80" width="80" height="80" class="welcome-icon" aria-hidden="true">
      <defs>
        <linearGradient id="welcome-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0284C7"/>
          <stop offset="100%" stop-color="#7DD3FC"/>
        </linearGradient>
      </defs>
      <circle cx="35" cy="30" r="14" fill="url(#welcome-grad)" opacity="0.3"/>
      <circle cx="35" cy="30" r="10" fill="url(#welcome-grad)" opacity="0.5"/>
      <circle cx="35" cy="30" r="6" fill="#F59E0B" opacity="0.9"/>
      <path d="M18 52 Q35 36 52 52" fill="none" stroke="url(#welcome-grad)" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 56 Q35 44 48 56" fill="none" stroke="url(#welcome-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </svg>
    <h2 class="welcome-title">Welcome to SkyCast</h2>
    <p class="welcome-text">Search for a city or use your current location<br>to get real-time weather and air quality data.</p>
    <div class="sample-cities">
      <span class="sample-label">Try:</span>
      <button class="sample-chip" data-city="Vilnius">Vilnius</button>
      <button class="sample-chip" data-city="London">London</button>
      <button class="sample-chip" data-city="Tokyo">Tokyo</button>
      <button class="sample-chip" data-city="New York">New York</button>
      <button class="sample-chip" data-city="Sydney">Sydney</button>
    </div>
  </div>
</main>

<footer class="footer">
  <p>SkyCast &mdash; Powered by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> &amp; <a href="https://nominatim.org/" target="_blank" rel="noopener">Nominatim</a></p>
</footer>

<script src="/static/js/app.js"></script>
</body>
</html>
